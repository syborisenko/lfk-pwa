<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ЛФК">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<title>ЛФК Тренировки</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#ebebea;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --green:#1D9E75;--gbg:#E1F5EE;--gtext:#0a5c42;
  --amber:#d97706;--abg:#fef3c7;
  --r:14px;--rsm:8px;--rp:99px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#141414;--bg2:#1f1f1f;--bg3:#2a2a2a;--text:#f0ede8;--text2:#888;--text3:#555;
    --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
    --gbg:#0a2e20;--gtext:#4ecba0;--abg:#2a1f00;--sh:0 1px 3px rgba(0,0,0,.3);}
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overflow-x:hidden;touch-action:pan-x pan-y;-ms-touch-action:pan-x pan-y;}
html{-webkit-text-size-adjust:100%;}
.screen{position:fixed;inset:0;overflow-y:auto;transition:opacity .25s,transform .25s;will-change:opacity,transform;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(12px);}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:10px 0 8px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text3);font-size:10px;transition:color .15s;}
.nb.active{color:var(--text);}
.nb svg{width:22px;height:22px;}

/* WELCOME */
#welcome{padding:0 0 90px;}
.wl-inner{max-width:480px;margin:0 auto;padding:48px 18px 20px;}
.wl-hero{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
.wl-icon{width:56px;height:56px;background:var(--text);border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wl-icon svg{fill:var(--bg);width:28px;height:28px;}
.wl-title{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.5px;}
.wl-date{font-size:13px;color:var(--text2);margin-top:2px;}
.streak-card{background:var(--bg2);border-radius:var(--r);padding:18px;margin-bottom:12px;}
.streak-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.streak-num{font-size:38px;font-weight:700;color:var(--text);line-height:1;}
.streak-lbl{font-size:12px;color:var(--text2);margin-top:3px;}
.streak-pts{font-size:26px;font-weight:700;color:var(--green);}
.week-dots{display:flex;gap:5px;}
.wd{flex:1;aspect-ratio:1;border-radius:6px;background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:var(--text3);gap:1px;}
.wd span{font-size:11px;font-weight:600;}
.wd.today{background:var(--text);color:var(--bg);}
.wd.done{background:var(--gbg);color:var(--gtext);}
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.mstat{background:var(--bg2);border-radius:var(--rsm);padding:12px 8px;text-align:center;}
.mstat-v{font-size:22px;font-weight:700;color:var(--text);}
.mstat-l{font-size:11px;color:var(--text2);margin-top:2px;}
.sec-lbl{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.day-cards{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.dc{background:var(--bg2);border-radius:var(--r);padding:15px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:transform .15s;border:1.5px solid transparent;}
.dc:active{transform:scale(.98);}
.dc.done{border-color:var(--green);}
.dc-name{font-size:15px;font-weight:600;color:var(--text);}
.dc-sub{font-size:12px;color:var(--text2);margin-top:3px;}
.dc-badge{font-size:11px;padding:3px 10px;border-radius:var(--rp);background:var(--gbg);color:var(--gtext);}
.dc-arrow{font-size:20px;color:var(--text3);}
.ach-row{display:flex;gap:8px;flex-wrap:wrap;}
.ach-pill{padding:6px 14px;border-radius:var(--rp);font-size:12px;}

/* WORKOUT */
#workout{padding:0 0 160px;}
.wk-hdr{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:13px 16px 11px;z-index:10;display:flex;align-items:center;gap:10px;}
.back-btn{width:34px;height:34px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.wk-title{font-size:15px;font-weight:600;color:var(--text);flex:1;}
.wk-pts{font-size:14px;font-weight:600;color:var(--green);}
.dtabs{display:flex;gap:6px;padding:10px 16px 0;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:7px 16px;border-radius:var(--rp);border:1px solid var(--border2);font-size:13px;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;}
.dtab.active{background:var(--text);color:var(--bg);border-color:transparent;}
.dtab.done{border-color:var(--green);color:var(--gtext);}
.ex-list{padding:10px 16px;}

/* CARD */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh);transition:transform .2s;}
.card.pop{animation:pop .35s ease;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.018)}100%{transform:scale(1)}}
.c-head{padding:14px 16px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.ex-name{font-size:15px;font-weight:600;color:var(--text);flex:1;margin-right:8px;line-height:1.3;}
.role-pill{font-size:11px;padding:3px 10px;border-radius:var(--rp);background:var(--bg2);color:var(--text2);flex-shrink:0;margin-top:2px;}
.c-meta{padding:3px 16px 10px;font-size:12px;color:var(--text2);}
.warn{margin:0 16px 10px;padding:9px 12px;background:var(--abg);border-radius:var(--rsm);border-left:2px solid var(--amber);font-size:12px;color:var(--amber);line-height:1.5;}
.tip-b{margin:0 16px 10px;padding:9px 12px;background:var(--bg2);border-radius:var(--rsm);border-left:2px solid var(--border2);}
.tip-t{font-size:12px;color:var(--text2);line-height:1.55;}
.steps-tog{display:flex;align-items:center;gap:6px;padding:0 16px 10px;cursor:pointer;user-select:none;}
.st-lbl{font-size:12px;color:var(--green);font-weight:500;}
.st-icon{font-size:10px;color:var(--green);transition:transform .2s;display:inline-block;}
.st-icon.open{transform:rotate(180deg);}
.steps-b{padding:0 16px 12px;display:none;}
.steps-b.open{display:block;}
.steps-ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.step-li{display:flex;gap:10px;align-items:flex-start;}
.step-n{width:20px;height:20px;border-radius:50%;background:var(--text);color:var(--bg);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-t{font-size:13px;color:var(--text);line-height:1.5;}
.yt-a{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:7px 14px;background:#ff0000;color:#fff;border-radius:var(--rsm);font-size:12px;font-weight:500;text-decoration:none;}
.yt-a svg{width:14px;height:14px;fill:#fff;flex-shrink:0;}
.c-ctrl{padding:10px 16px 14px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);}
.tbtn{padding:8px 16px;border-radius:var(--rp);border:1px solid var(--border2);font-size:13px;cursor:pointer;background:transparent;color:var(--text);transition:all .15s;flex-shrink:0;}
.tbtn.on{background:var(--text);color:var(--bg);border-color:transparent;}
.tdisp{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);min-width:54px;}
.dots{display:flex;gap:7px;align-items:center;}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;transition:all .2s;flex-shrink:0;}
.dot.filled{background:var(--text);border-color:var(--text);transform:scale(1.1);}
.dlbl{font-size:12px;color:var(--text2);margin-left:2px;}
.dbtn{margin-left:auto;padding:8px 18px;border-radius:var(--rp);border:1px solid var(--green);color:var(--gtext);font-size:13px;font-weight:500;cursor:pointer;background:transparent;transition:all .2s;flex-shrink:0;}
.dbtn.ok{background:var(--green);color:#fff;border-color:var(--green);}
.pbar{height:3px;background:var(--bg3);overflow:hidden;}
.pfill{height:100%;background:var(--green);transition:width .5s ease;}
.bb{position:fixed;bottom:calc(54px + env(safe-area-inset-bottom));left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;z-index:20;}
.abtn{flex:1;padding:13px;border-radius:var(--rsm);border:1px solid var(--border2);font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:var(--text);transition:all .15s;}
.abtn:active{transform:scale(.97);}
.abtn.pr{background:var(--text);color:var(--bg);border-color:transparent;}

/* LIBRARY */
#library{padding:0 0 80px;}
.lib-hdr{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;z-index:10;display:flex;align-items:center;gap:10px;}
.lib-search{flex:1;padding:8px 14px;border-radius:var(--rp);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;outline:none;}
.lib-search::placeholder{color:var(--text3);}
.lib-filters{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
.lib-filters::-webkit-scrollbar{display:none;}
.fchip{flex-shrink:0;padding:5px 14px;border-radius:var(--rp);border:1px solid var(--border2);font-size:12px;cursor:pointer;background:transparent;color:var(--text2);}
.fchip.active{background:var(--text);color:var(--bg);border-color:transparent;}
.lib-list{padding:0 16px;}
.lc{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);cursor:pointer;}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.lc-name{font-size:14px;font-weight:600;color:var(--text);}
.lc-role{font-size:11px;padding:2px 8px;border-radius:var(--rp);background:var(--bg2);color:var(--text2);}
.lc-tip{font-size:12px;color:var(--text2);line-height:1.4;}
.lc-steps{display:none;margin-top:10px;}
.lc-steps.open{display:block;}
.lc-steps-ul{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-8px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--rp);font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav button{background:transparent;border:1px solid var(--border2);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--text);font-size:14px;}
.cal-month{font-size:15px;font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
.cal-hdr{font-size:11px;color:var(--text3);padding:4px 0;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:50%;cursor:pointer;color:var(--text2);transition:all .15s;}
.cal-d.other{color:var(--text3);opacity:.4;}
.cal-d.today{border:1.5px solid var(--green);}
.cal-d.has{background:var(--gbg);color:var(--gtext);font-weight:600;}
.cal-d.sel{background:var(--text);color:var(--bg);}
.cal-detail{margin-top:14px;padding:14px;background:var(--bg2);border-radius:var(--r);}
.cal-detail-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.cal-detail-sub{font-size:12px;color:var(--text2);}

/* GRAPHS */
.sg-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.sg-card{background:var(--bg2);border-radius:var(--rsm);padding:12px 8px;text-align:center;}
.sg-card-v{font-size:22px;font-weight:700;}
.sg-card-l{font-size:11px;color:var(--text2);margin-top:2px;}
.sg-sec{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:16px 0 10px;}
.sg-bars{display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:8px;}
.sg-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.sg-bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--gbg);transition:height .3s;}
.sg-bar-fill.cur{background:var(--green);}
.sg-bar-lbl{font-size:9px;color:var(--text3);}
.sg-pie-row{display:flex;gap:14px;align-items:center;}
.sg-pie{width:64px;height:64px;border-radius:50%;flex-shrink:0;}
.sg-legend{font-size:12px;display:flex;flex-direction:column;gap:4px;}

/* REST TIMER */
.rest-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.rest-time{font-size:48px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
.rest-lbl{font-size:14px;color:rgba(255,255,255,.7);}
.rest-bar{width:200px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;}
.rest-bar-fill{height:100%;background:#fff;transition:width 1s linear;}
.rest-skip{padding:10px 24px;border-radius:var(--rp);border:1px solid rgba(255,255,255,.3);color:#fff;background:transparent;font-size:14px;cursor:pointer;margin-top:8px;}
/* AUTO PLAYER */
.ap-top{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:4px;}
.ap-close{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ap-progress{font-size:13px;color:var(--text2);font-weight:600;}
.ap-eta{font-size:11px;color:var(--text3);}
.ap-eta{font-size:11px;color:var(--text3);margin-top:1px;}
.ap-pbar{width:100%;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:24px;}
.ap-pfill{height:100%;background:var(--green);transition:width .4s ease;}
.ap-phase{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.ap-name{font-size:24px;font-weight:700;text-align:center;line-height:1.2;margin-bottom:4px;}
.ap-meta{font-size:14px;color:var(--text2);margin-bottom:16px;}
.ap-sets{display:flex;gap:8px;margin-bottom:20px;}
.ap-set-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all .2s;}
.ap-set-dot.filled{background:var(--green);border-color:var(--green);}
.ap-set-dot.current{border-color:var(--text);transform:scale(1.2);}
.ap-ring-wrap{position:relative;width:180px;height:180px;margin:8px 0 16px;}
.ap-ring-svg{width:100%;height:100%;transform:rotate(-90deg);}
.ap-ring-track{fill:none;stroke:var(--bg3);stroke-width:6;}
.ap-ring-fill{fill:none;stroke:var(--green);stroke-width:6;stroke-linecap:round;}
.ap-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text);}
.ap-ring-lbl{font-size:14px;color:var(--text2);margin-bottom:16px;}
.ap-reps-big{font-size:32px;font-weight:700;color:var(--text);margin-bottom:8px;}
.ap-tip{font-size:13px;color:var(--text2);text-align:center;line-height:1.5;max-width:320px;margin-bottom:16px;}
.ap-nav{display:flex;gap:8px;width:100%;max-width:280px;margin-bottom:8px;}
.ap-nav button{flex:1;}
.ap-btn{width:100%;max-width:280px;padding:16px;border-radius:var(--r);border:none;background:var(--text);color:var(--bg);font-size:17px;font-weight:600;cursor:pointer;transition:transform .15s;}
.ap-btn:active{transform:scale(.97);}
.ap-btn.pulse{animation:ap-pulse 2s infinite;}
@keyframes ap-pulse{0%,100%{box-shadow:0 0 0 0 rgba(29,158,117,.4);}50%{box-shadow:0 0 0 12px rgba(29,158,117,0);}}
.ap-btn-sec{width:100%;max-width:280px;padding:12px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;}
.ap-btn-sm{padding:12px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;}
.ap-warn{font-size:12px;color:var(--amber);text-align:center;margin-top:8px;max-width:320px;line-height:1.4;}
.ap-done-icon{width:80px;height:80px;border-radius:50%;background:var(--gbg);color:var(--gtext);font-size:36px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.ap-how{width:100%;max-width:320px;margin-top:8px;cursor:pointer;}
.ap-how-tog{display:flex;align-items:center;gap:6px;justify-content:center;}
.ap-how-tog .st-icon{transition:transform .2s;font-size:10px;color:var(--green);}
.ap-how.open .ap-how-tog .st-icon{transform:rotate(180deg);}
.ap-how-body{display:none;margin-top:10px;text-align:left;}
.ap-how.open .ap-how-body{display:block;}
.ap-steps{font-size:13px;color:var(--text2);line-height:1.6;padding-left:20px;display:flex;flex-direction:column;gap:6px;}
.ap-steps li{padding-left:4px;}
.ap-next{width:100%;max-width:320px;margin-top:12px;padding:12px;background:var(--bg2);border-radius:var(--rsm);text-align:center;}
.ap-next-lbl{font-size:11px;color:var(--text3);margin-bottom:4px;}
.ap-next-name{font-size:14px;font-weight:600;color:var(--text);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="rest-overlay" id="restOverlay" style="display:none;">
  <div class="rest-lbl">Отдых</div>
  <div class="rest-time" id="restTime">60</div>
  <div class="rest-bar"><div class="rest-bar-fill" id="restBar"></div></div>
  <button class="rest-skip" onclick="skipRest()">Пропустить</button>
</div>

<div id="autoPlayer" style="display:none;position:fixed;inset:0;z-index:60;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto;">
  <div id="apContent" style="width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:12px;"></div>
</div>
<div id="settingsOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;" onclick="closeSett()"></div>
<div id="settingsModal" style="display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:16px 16px 0 0;padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));z-index:51;max-height:70vh;overflow-y:auto;box-shadow:0 -4px 30px rgba(0,0,0,.2);">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
    <div style="font-size:17px;font-weight:600;">Настройки</div>
    <button style="background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--text2);" onclick="closeSett()">&#10005;</button>
  </div>
  <div style="margin-bottom:18px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;">Время отдыха между подходами</div>
    <div style="display:flex;gap:8px;" id="restBtns"></div>
  </div>
  <div style="margin-bottom:18px;">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;">Данные</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="abtn" onclick="exportData()">Экспорт данных</button>
      <button class="abtn" onclick="document.getElementById('importFile').click()">Импорт данных</button>

// STATE
function loadSt(){
  var raw;
  try{raw=localStorage.getItem('lfk_v6');}catch(e){}
  if(raw){try{return JSON.parse(raw);}catch(e){}}
  // migrate from v5/v4
  var old;
  try{var s=localStorage.getItem('lfk_v5')||localStorage.getItem('lfk_v4');if(s)old=JSON.parse(s);}catch(e){}
  if(old) return migrateV5(old);
  return freshState();
}
function freshState(){
  return{points:0,total:0,streak:0,weekCount:0,doneTypes:[],completedDays:{},exerciseSets:{},
    trainedDays:[],shuffles:0,selIds:[null,null,null],lastDate:null,
    history:[],customParams:{},paramHistory:{},exCompletions:{},disabledExercises:[],
    progressionDismissed:{},restTime:60,lastReminder:null,maxStreak:0,version:6,migrationDate:new Date().toISOString()};
}
function migrateV5(old){
  var s=freshState();
  // copy existing fields
  ['points','total','streak','weekCount','doneTypes','completedDays','exerciseSets',
   'trainedDays','shuffles','selIds','lastDate'].forEach(function(k){if(old[k]!==undefined)s[k]=old[k];});
  // backfill history from completedDays
  if(old.completedDays){
    Object.keys(old.completedDays).forEach(function(dateStr){
      s.history.push({date:dateStr,dayType:old.completedDays[dateStr],points:0,exerciseCount:0,duration:0});
    });
    s.history.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  }
  s.maxStreak=old.streak||0;
  s.migrationDate=new Date().toISOString();
  return s;
}

if(!st.selIds)st.selIds=[null,null,null];
if(!st.history)st.history=[];
if(!st.exCompletions)st.exCompletions={};
if(!st.disabledExercises)st.disabledExercises=[];
if(!st.customParams)st.customParams={};
if(!st.paramHistory)st.paramHistory={};
if(!st.progressionDismissed)st.progressionDismissed={};
if(st.maxStreak===undefined)st.maxStreak=0;
// Rebuild selIds if slot count changed (e.g. after app update)
for(var di=0;di<3;di++){
  var sl=SLOTS[di];
  if(!st.selIds[di]||st.selIds[di].length!==sl.length){
    st.selIds[di]=sl.map(function(s){return getFirstEnabled(s.ids);});
  } else {
    // validate each id still exists; replace with first option if not
    st.selIds[di]=st.selIds[di].map(function(id,si){
      return sl[si]&&sl[si].ids.indexOf(id)>=0?id:getFirstEnabled(sl[si].ids);
    });
  }
}

function getFirstEnabled(ids){
  if(!st.disabledExercises)return ids[0];
  for(var i=0;i<ids.length;i++){if(st.disabledExercises.indexOf(ids[i])<0)return ids[i];}
  return null;
}

function getAudioCtx(){
  if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();

  return _audioCtx;
}

function beep(f,d,v){
  try{var c=getAudioCtx();var o=c.createOscillator();var g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=f||880;
  g.gain.setValueAtTime(v||.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+(d||.2));
  o.start(c.currentTime);o.stop(c.currentTime+(d||.2));}catch(e){}}

function togT(key,secs){

  var t=timers[key];
  if(t.running){clearInterval(t.interval);t.running=false;}
  else{t.running=true;t.interval=setInterval(function(){
    t.elapsed++;

    var td=document.getElementById('td_'+key);if(td)td.textContent=secs?fmt(Math.max(0,secs-t.elapsed)):fmt(t.elapsed);

  },1000);}

function addS(key,tot){
  var cur=st.exerciseSets[key]||0;if(cur>=tot)return;

  saveSt();renderEx();document.getElementById('wkPts').textContent=st.points+' pts';

  if(st.exerciseSets[key]<tot){

    var slot=SLOTS[di]&&SLOTS[di][si];

    var exId=getCurEx(curDay)[parseInt(key.split('_')[1])];

  SLOTS[curDay].forEach(function(sl,i){

    if(enabled.length<2)return;
    var cur=st.selIds[curDay][i];var idx=enabled.indexOf(cur);
    st.selIds[curDay][i]=enabled[(idx+1)%enabled.length];
  });

function finishWorkout(){
  var tk=new Date().toDateString();
  if(st.completedDays&&st.completedDays[tk]!==undefined){toast('Уже засчитано сегодня!');return;}
  if(!st.completedDays)st.completedDays={};
  st.completedDays[tk]=curDay;st.total++;st.points+=50;
  // track history
  var exCount=getCurEx(curDay).filter(Boolean).length;
  st.history.push({date:tk,dayType:curDay,points:50,exerciseCount:exCount,duration:0});
  if(st.doneTypes.indexOf(curDay)<0)st.doneTypes.push(curDay);
  st.weekCount=Math.min(3,st.weekCount+1);
  var dow=new Date().getDay();var ti=dow===0?6:dow-1;
  if(st.trainedDays.indexOf(ti)<0)st.trainedDays.push(ti);
  var ld=st.lastDate?new Date(st.lastDate):null;var now=new Date();
  st.streak=(ld&&(now-ld)<2*24*3600*1000)?st.streak+1:1;
  // track maxStreak after streak is updated
  if(st.streak>st.maxStreak)st.maxStreak=st.streak;
  st.lastDate=now.toISOString();saveSt();beepFin();toast('Тренировка завершена! +50 🎉');
  setTimeout(function(){renderWorkout();},300);
}

function apEstimate(){
  var list=apGetExercises();var sec=0;var rest=15;
  for(var i=ap.idx;i<list.length;i++){
    var p=list[i].params;var key=curDay+'_'+list[i].slotIdx;var done=st.exerciseSets[key]||0;
    var rem=Math.max(0,p.sets-done);
    if(p.secs>0)sec+=rem*p.secs; else sec+=rem*20;
    if(rem>1)sec+=(rem-1)*rest;
  }

function apStartTimer(){

  },1000);
}

function apCompleteSet(){
  var list=apGetExercises();var item=list[ap.idx];var p=item.params;
  var key=curDay+'_'+item.slotIdx;
  var cur=st.exerciseSets[key]||0;st.exerciseSets[key]=cur+1;st.points+=5;
  if(st.exerciseSets[key]>=p.sets){st.points+=10;st.exCompletions[item.ex.id]=(st.exCompletions[item.ex.id]||0)+1;}
  saveSt();apVibrate(80);
  if(st.exerciseSets[key]>=p.sets){
    ap.phase='idle';ap.elapsed=0;
    if(apFindNext(ap.idx+1)){
      var nextList=apGetExercises();var nextP=nextList[ap.idx].params;
      if(nextP.secs>0){apStartPrep();}else{apRender();}
    }else apFinish();
  } else if(p.secs>0){
    apStartRest();
  } else {
    ap.phase='idle';ap.elapsed=0;apRender();

function apDoneSet(){apCompleteSet();}
function apStartRest(){

    var nl=apGetExercises();var np=nl[ap.idx].params;
    if(np.secs>0){apStartPrep();}else{apRender();}
  }else apFinish();
}
function apFinish(){
  ap.phase='done';var list=apGetExercises();
  document.getElementById('autoPlayer').style.background='var(--bg)';
  var h='<div class="ap-done-icon">\u2713</div>';
  h+='<div class="ap-name">Все упражнения выполнены!</div>';
  h+='<div class="ap-meta">'+list.length+' упражнений</div>';
  h+='<button class="ap-btn" onclick="finishWorkout();closeAutoPlayer();">Завершить тренировку +50</button>';
  h+='<button class="ap-btn-sec" onclick="closeAutoPlayer()">Назад к списку</button>';
  document.getElementById('apContent').innerHTML=h;beepFin();apVibrate([100,80,100,80,200]);
}

// LIBRARY
var allRoles=[];
EX.forEach(function(e){if(allRoles.indexOf(e.role)<0)allRoles.push(e.role);});

function renderLib(){
  var q=(document.getElementById('libQ').value||'').toLowerCase();
  var chips=['all','отключённые'].concat(allRoles);
  document.getElementById('libF').innerHTML=chips.map(function(r){
    return'<button class="fchip'+(libFilt===r?' active':'')+'" onclick="setFilt(\''+r+'\')">'+(r==='all'?'Все':(r==='отключённые'?'Отключённые':r))+'</button>';
  }).join('');
  var exs=EX.filter(function(e){
    var mf;
    if(libFilt==='отключённые'){
      mf=st.disabledExercises&&st.disabledExercises.indexOf(e.id)>=0;
    } else {
      mf=libFilt==='all'||e.role===libFilt;
    }
    var mq=!q||e.name.toLowerCase().includes(q)||e.role.toLowerCase().includes(q);
    return mf&&mq;
  });
  document.getElementById('libL').innerHTML=exs.map(function(ex){
    var dl=['День A','День B','День C'];var days=ex.day.map(function(d){return dl[d];}).join(', ');
    var sid='ls_'+ex.id;
    var isOff=st.disabledExercises&&st.disabledExercises.indexOf(ex.id)>=0;
    var cardStyle=isOff?'opacity:.5;':'';
    var togHtml='<button style="margin-left:8px;padding:3px 10px;border-radius:var(--rp);font-size:11px;cursor:pointer;border:1px solid '
      +(isOff?'var(--amber)':'var(--green)')+';background:'+(isOff?'var(--abg)':'transparent')+';color:'+(isOff?'var(--amber)':'var(--gtext)')+';" onclick="toggleExDis(\''+ex.id+'\');event.stopPropagation();">'
      +(isOff?'Отключено':'Вкл')+'</button>';
    return'<div class="lc" style="'+cardStyle+'">'
      +'<div class="lc-top"><div class="lc-name">'+ex.name+'</div><div style="display:flex;align-items:center;"><div class="lc-role">'+ex.role+'</div>'+togHtml+'</div></div>'
      +'<div class="lc-tip">'+ex.tip+'</div>'
      +(ex.warn?'<div style="font-size:12px;color:var(--amber);margin-top:6px;">&#9888; '+ex.warn+'</div>':'')
      +'<div style="font-size:11px;color:var(--text3);margin-top:6px;">'+days+' · '+(ex.sets>1?ex.sets+' подхода':ex.secs+' сек')+(ex.reps?' · '+ex.reps:'')+'</div>'
      +(ex.steps?'<div style="display:flex;align-items:center;gap:6px;margin-top:10px;cursor:pointer;" onclick="togLS(\''+sid+'\')">'
        +'<span style="font-size:12px;color:var(--green);font-weight:500;">Как выполнять</span>'
        +'<span style="font-size:10px;color:var(--green);" id="lsi_'+ex.id+'">&#9660;</span></div>'
        +'<div class="lc-steps" id="'+sid+'">'
        +'<ul class="lc-steps-ul">'+ex.steps.map(function(s,n){
          return'<li class="step-li"><div class="step-n">'+(n+1)+'</div><div class="step-t">'+s+'</div></li>';
        }).join('')+'</ul>'
        +(ex.yt?'<a class="yt-a" href="'+ex.yt+'" target="_blank"><svg viewBox="0 0 24 24"><polygon points="10 8 16 12 10 16 10 8"/><rect x="2" y="4" width="20" height="16" rx="4" fill="none" stroke="white" stroke-width="1.5"/></svg>YouTube</a>':'')
        +'</div>':'')
    +'</div>';
  }).join('');
}
function setFilt(r){libFilt=r;renderLib();}
function togLS(sid){
  var el=document.getElementById(sid);if(!el)return;
  var id=sid.replace('ls_','');var ic=document.getElementById('lsi_'+id);
  var o=el.classList.toggle('open');if(ic)ic.style.transform=o?'rotate(180deg)':'';
}

// STATS
var calMonth=new Date().getMonth(),calYear=new Date().getFullYear(),calSel=null;
var stCurTab='cal';

function stTab(t){
  stCurTab=t;
  document.getElementById('stCal').style.display=t==='cal'?'block':'none';
  document.getElementById('stGraphs').style.display=t==='graphs'?'block':'none';
  var tabs=document.getElementById('stTabs').querySelectorAll('.dtab');
  tabs[0].className='dtab'+(t==='cal'?' active':'');
  tabs[1].className='dtab'+(t==='graphs'?' active':'');
  if(t==='cal')renderCal();
  if(t==='graphs')renderGraphs();
}

function renderStats(){
  if(stCurTab==='cal')renderCal();else renderGraphs();
}

function renderCal(){
  var months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  var first=new Date(calYear,calMonth,1);
  var startDow=first.getDay();startDow=startDow===0?6:startDow-1;// Monday=0
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var prevDays=new Date(calYear,calMonth,0).getDate();
  var today=new Date();
  var todayStr=today.getFullYear()+'-'+(today.getMonth()+1)+'-'+today.getDate();

  // build history lookup: "YYYY-M-D" -> entry
  var hmap={};
  (st.history||[]).forEach(function(h){
    var d=new Date(h.date);
    var k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    hmap[k]=h;
  });

  var html='<div class="cal-nav">';
  html+='<button onclick="calNav(-1)">&larr;</button>';
  html+='<div class="cal-month">'+months[calMonth]+' '+calYear+'</div>';
  html+='<button onclick="calNav(1)">&rarr;</button></div>';
  html+='<div class="cal-grid">';
  ['пн','вт','ср','чт','пт','сб','вс'].forEach(function(d){html+='<div class="cal-hdr">'+d+'</div>';});

  // prev month fill
  for(var p=startDow-1;p>=0;p--){
    html+='<div class="cal-d other">'+(prevDays-p)+'</div>';
  }
  // current month
  for(var d=1;d<=daysInMonth;d++){
    var k=calYear+'-'+(calMonth+1)+'-'+d;
    var cls='cal-d';
    if(hmap[k])cls+=' has';
    if(k===todayStr)cls+=' today';
    if(calSel===k)cls+=' sel';
    html+='<div class="'+cls+'" onclick="calPick(\''+k+'\')">'+d+'</div>';
  }
  // next month fill
  var totalCells=startDow+daysInMonth;
  var rem=totalCells%7===0?0:7-totalCells%7;
  for(var n=1;n<=rem;n++){html+='<div class="cal-d other">'+n+'</div>';}
  html+='</div>';

  // detail
  if(calSel&&hmap[calSel]){
    var h=hmap[calSel];
    var dn=['День A — Таз, поясница, ноги','День B — Шея, осанка, плечи','День C — Кор, стабилизация'];
    html+='<div class="cal-detail"><div class="cal-detail-title">'+dn[h.dayType]+'</div>';
    html+='<div class="cal-detail-sub">'+h.exerciseCount+' упражнений · +'+h.points+' очков</div></div>';
  } else if(calSel){
    html+='<div class="cal-detail"><div class="cal-detail-sub">Нет тренировки</div></div>';
  }
  document.getElementById('stCal').innerHTML=html;
}
function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}calSel=null;renderCal();}
function calPick(k){calSel=calSel===k?null:k;renderCal();}

// GRAPHS
function renderGraphs(){
  var html='';
  // summary cards
  html+='<div class="sg-cards">';
  html+='<div class="sg-card"><div class="sg-card-v">'+st.total+'</div><div class="sg-card-l">тренировок</div></div>';
  html+='<div class="sg-card"><div class="sg-card-v" style="color:var(--green);">'+st.points+'</div><div class="sg-card-l">очков</div></div>';
  html+='<div class="sg-card"><div class="sg-card-v">'+st.maxStreak+'</div><div class="sg-card-l">макс стрик</div></div>';
  html+='</div>';

  // weekly bar chart (last 8 weeks)
  html+='<div class="sg-sec">Тренировок в неделю</div>';
  var weeks=[];var now=new Date();
  for(var w=7;w>=0;w--){
    var dow=now.getDay()||7;// Sunday=7 for ISO
    var wStart=new Date(now);wStart.setDate(now.getDate()-dow+1-w*7);// Monday
    var wEnd=new Date(wStart);wEnd.setDate(wStart.getDate()+6);
    var count=0;
    (st.history||[]).forEach(function(h){
      var d=new Date(h.date);if(d>=wStart&&d<=wEnd)count++;
    });
    weeks.push({count:count,label:(wStart.getDate())+'/'+(wStart.getMonth()+1)});
  }
  var maxW=Math.max.apply(null,weeks.map(function(w){return w.count;}))||1;
  html+='<div class="sg-bars">';
  weeks.forEach(function(w,i){
    var h=Math.round(w.count/maxW*100);
    html+='<div class="sg-bar"><div class="sg-bar-fill'+(i===weeks.length-1?' cur':'')+'" style="height:'+Math.max(h,4)+'%;"></div><div class="sg-bar-lbl">'+w.label+'</div></div>';
  });
  html+='</div>';

  // day balance pie
  html+='<div class="sg-sec">Баланс по дням</div>';
  var dc=[0,0,0];
  (st.history||[]).forEach(function(h){if(h.dayType>=0&&h.dayType<=2)dc[h.dayType]++;});
  var tot=dc[0]+dc[1]+dc[2]||1;
  var pA=Math.round(dc[0]/tot*100),pB=Math.round(dc[1]/tot*100),pC=100-pA-pB;
  html+='<div class="sg-pie-row">';
  html+='<div class="sg-pie" style="background:conic-gradient(var(--green) 0% '+pA+'%, #d97706 '+pA+'% '+(pA+pB)+'%, #6366f1 '+(pA+pB)+'% 100%);"></div>';
  html+='<div class="sg-legend">';
  html+='<div><span style="color:var(--green);">&#9679;</span> День A — '+pA+'%</div>';
  html+='<div><span style="color:#d97706;">&#9679;</span> День B — '+pB+'%</div>';
  html+='<div><span style="color:#6366f1;">&#9679;</span> День C — '+pC+'%</div>';
  html+='</div></div>';

  document.getElementById('stGraphs').innerHTML=html;
}

// SETTINGS
function openSett(){
  document.getElementById('settingsOverlay').style.display='block';
  document.getElementById('settingsModal').style.display='block';
  renderRestBtns();
}
function closeSett(){
  document.getElementById('settingsOverlay').style.display='none';
  document.getElementById('settingsModal').style.display='none';
}
function renderRestBtns(){
  var times=[30,45,60,90];
  document.getElementById('restBtns').innerHTML=times.map(function(t){
    return '<button class="tbtn'+(st.restTime===t?' on':'')+'" onclick="setRest('+t+')">'+t+' сек</button>';
  }).join('');
}
function setRest(t){st.restTime=t;saveSt();renderRestBtns();toast('Отдых: '+t+' сек');}

function exportData(){
  var blob=new Blob([JSON.stringify(st,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  var d=new Date();
  a.download='lfk-backup-'+d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate()+'.json';
  a.click();URL.revokeObjectURL(url);
  toast('Данные экспортированы');
}
function importData(ev){
  var file=ev.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(data.version&&data.version>6){toast('Файл от более новой версии');return;}
      if(data.points===undefined||data.total===undefined){toast('Неверный формат файла');return;}
      if(!confirm('Заменить текущие данные? Это действие нельзя отменить.'))return;
      // migrate if needed
      if(!data.version||data.version<6)data=migrateV5(data);
      st=data;saveSt();
      toast('Данные импортированы');closeSett();renderWelcome();
    }catch(err){toast('Ошибка чтения файла');}
  };
  reader.readAsText(file);
  ev.target.value='';
}
function resetData(){
  if(!confirm('Сбросить весь прогресс? Это действие нельзя отменить.'))return;
  st=freshState();saveSt();toast('Прогресс сброшен');closeSett();renderWelcome();
}

// REST TIMER
var restInterval=null;
function startRest(){
  var t=st.restTime||60;var rem=t;
  document.getElementById('restOverlay').style.display='flex';
  document.getElementById('restTime').textContent=rem;
  document.getElementById('restBar').style.width='0%';
  restInterval=setInterval(function(){
    rem--;
    document.getElementById('restTime').textContent=rem;
    document.getElementById('restBar').style.width=Math.round((t-rem)/t*100)+'%';
    if(rem<=3&&rem>0)beep(440,.05,.1);
    if(rem<=0){skipRest();beepOk();toast('Отдых окончен!');}
  },1000);
}
function skipRest(){
  clearInterval(restInterval);restInterval=null;
  document.getElementById('restOverlay').style.display='none';
}

// LOAD PROGRESSION
function getExParams(ex){
  var custom=st.customParams&&st.customParams[ex.id];
  return{reps:custom&&custom.reps||ex.reps, secs:custom&&custom.secs!==undefined?custom.secs:ex.secs, sets:custom&&custom.sets||ex.sets};
}
function adjParam(exId,field,delta){
  if(!st.customParams)st.customParams={};
  if(!st.customParams[exId])st.customParams[exId]={};
  var ex=gex(exId);if(!ex)return;
  var cur=getExParams(ex);
  if(field==='secs'){
    var ns=Math.max(5,(cur.secs||ex.secs)+delta);
    st.customParams[exId].secs=ns;
  } else if(field==='reps'){
    var m=(cur.reps||ex.reps).match(/(\d+)/);
    if(m){var nv=Math.max(1,parseInt(m[1])+delta);
      st.customParams[exId].reps=(cur.reps||ex.reps).replace(/\d+/,nv);}
  }
  if(!st.paramHistory)st.paramHistory={};
  if(!st.paramHistory[exId])st.paramHistory[exId]=[];
  st.paramHistory[exId].push({date:new Date().toISOString(),reps:st.customParams[exId].reps||ex.reps,secs:st.customParams[exId].secs||ex.secs});
  saveSt();renderEx();
}
function shouldSuggestProgression(exId){
  if(!st.exCompletions||!st.exCompletions[exId]||st.exCompletions[exId]<4)return false;
  var hist=st.paramHistory&&st.paramHistory[exId];
  var lastChange=hist&&hist.length?new Date(hist[hist.length-1].date):new Date(st.migrationDate||Date.now());
  var daysSince=(Date.now()-lastChange.getTime())/(1000*60*60*24);
  if(daysSince<14)return false;
  var dismissed=st.progressionDismissed&&st.progressionDismissed[exId];
  if(dismissed&&(Date.now()-new Date(dismissed).getTime())<7*24*60*60*1000)return false;
  return true;
}
function dismissProgression(exId){
  if(!st.progressionDismissed)st.progressionDismissed={};
  st.progressionDismissed[exId]=new Date().toISOString();
  saveSt();renderEx();
}

// EXERCISE DISABLING
function toggleExDis(id){
  if(!st.disabledExercises)st.disabledExercises=[];
  var idx=st.disabledExercises.indexOf(id);
  if(idx>=0){st.disabledExercises.splice(idx,1);toast('Упражнение включено');}
  else{st.disabledExercises.push(id);toast('Упражнение отключено');}
  for(var di=0;di<3;di++){
    SLOTS[di].forEach(function(sl,si){
      if(st.disabledExercises.indexOf(st.selIds[di][si])>=0){
        st.selIds[di][si]=getFirstEnabled(sl.ids);
      }
    });
  }
  saveSt();renderLib();
  if(curScreen==='workout')renderEx();
}

// SOFT REMINDER
function dismissReminder(){
  st.lastReminder=new Date().toDateString();
  saveSt();
  document.getElementById('wReminder').innerHTML='';
}

if('serviceWorker' in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});
